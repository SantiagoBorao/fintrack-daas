name: Daily Market Data Collector

on:
  schedule:
    - cron: '0 22 * * 1-5'  # Every weekday at 22:00 UTC (markets closed)
  workflow_dispatch:          # Allow manual trigger from GitHub

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials file
        run: echo '${{ secrets.GCLOUD_KEY }}' > gcloud-key.json

      - name: Run collector
        run: python collector/collector.py